<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>快递账单详情（最终优化版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f8f9fa;
            padding: 30px;
            line-height: 1.5;
            font-size: 14px;
        }
        .main-container {
            display: flex;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 左侧：信息录入区 - 固定高度，超出可滚动 */
        .input-section {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            /* 固定高度，超出内容可滚动 */
            max-height: 700px;
            overflow-y: auto;
            /* 隐藏滚动条但保持滚动功能 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .input-section::-webkit-scrollbar {
            display: none;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #222;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #007AFF;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 60px;
            height: 2px;
            background: #0056d2;
        }
        .title-save-btn {
            padding: 8px 16px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            flex-shrink: 0;
        }
        .title-save-btn:hover {
            background-color: #0056d2;
        }
        .input-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            position: relative;
        }
        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            padding-right: 36px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            transition: all 0.2s ease;
            outline: none;
            min-width: 0;
        }
        .input-wrapper input:focus {
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }
        .input-wrapper input::placeholder {
            color: #999;
            font-size: 13px;
        }
        .delete-btn {
            width: 28px; 
            height: 28px;
            background-color: transparent;
            color: #333;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            pointer-events: none;
        }
        .input-wrapper:hover .delete-btn,
        .input-wrapper input:focus + .delete-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .delete-btn:hover {
            background-color: #f5f5f5;
            color: #ff4444;
        }
        .save-btn {
            width: 100%;
            padding: 12px 0;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }
        .save-btn:hover {
            background-color: #0056d2;
        }
        /* 右侧：账单详情展示区 - 高度自适应内容，最大高度与左侧一致 */
        .result-section {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            /* 最大高度与左侧一致 */
            max-height: 700px;
            overflow-y: auto;
            /* 隐藏滚动条但保持滚动功能 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .result-section::-webkit-scrollbar {
            display: none;
        }
        .bill-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 0;
            border-bottom: none;
        }
        .bill-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .total-amount {
            font-size: 36px;
            font-weight: 700;
            color: #222;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f5f5f5;
            margin-bottom: 10px;
        }
        .divider {
            height: 1px;
            background: #f5f5f5;
            margin: 18px 0;
        }
        .fee-detail {
            margin-bottom: 20px;
        }
        .fee-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #555;
        }
        .fee-row span:first-child {
            width: 80px;
            color: #666;
            flex-shrink: 0;
            text-align: left;
            font-size: 12px;
        }
        .fee-row span:last-child {
            font-weight: 400;
            color: #333;
            text-align: right;
            flex: 1;
            font-size: 12px;
        }
        .city-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 0;
        }
        .city-item {
            text-align: center;
            flex: 1;
        }
        .city-name {
            font-size: 18px;
            color: #222;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .city-user {
            font-size: 12px;
            color: #888;
        }
        .arrow {
            width: 70px;
            height: 3px;
            background: #007AFF;
            position: relative;
            margin: 0 8px;
        }
        .arrow::after {
            content: '';
            position: absolute;
            right: -4px;
            top: -3px;
            width: 0;
            height: 0;
            border-left: 10px solid #007AFF;
            border-top: 6px solid transparent;
            border-bottom: 0 solid transparent;
        }
        .info-section {
            margin-bottom: 8px;
        }
        .info-row {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #555;
            transition: background 0.2s ease;
            border-radius: 8px;
            padding: 6px 0;
            margin-bottom: 2px;
        }
        .info-row:hover {
            background: #f8f9fa;
        }
        .info-label {
            width: 80px;
            color: #888;
            font-weight: 500;
            flex-shrink: 0;
            padding-top: 0;
            font-size: 12px;
        }
        .info-value {
            flex: 1;
            color: #333;
            word-break: break-word;
            font-weight: 400;
            line-height: 1.4;
            font-size: 13px;
        }
        .check-code {
            font-size: 36px;
            font-weight: 600;
            color: #007AFF;
            letter-spacing: 2px;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧：信息录入区 -->
        <div class="input-section">
            <h2 class="section-title">快递信息录入<button class="title-save-btn" onclick="saveAsImage()">保存为图片</button></h2>
            
            <!-- 费用相关 -->
            <div class="input-group">
                <label>费用合计：</label>
                <div class="input-wrapper">
                    <input type="number" id="totalAmount" placeholder="请输入费用合计" step="0.01" oninput="handleInputChange('totalAmount'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('totalAmount')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>总重量：</label>
                <div class="input-wrapper">
                    <input type="number" id="totalWeight" placeholder="请输入总重量" step="0.01" oninput="handleInputChange('totalWeight'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('totalWeight')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>基础运费：</label>
                <div class="input-wrapper">
                    <input type="number" id="baseFee" placeholder="请输入基础运费" step="0.01" oninput="handleInputChange('baseFee'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('baseFee')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>保价费：</label>
                <div class="input-wrapper">
                    <input type="number" id="insureFee" placeholder="请输入保价费" step="0.01" oninput="handleInputChange('insureFee'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('insureFee')">×</button>
                </div>
            </div>

            <!-- 地址信息 -->
            <div class="input-group">
                <label>寄件地址：</label>
                <div class="input-wrapper">
                    <input type="text" id="sendAddress" placeholder="示例：张三 13800138000 广东省深圳市南山区XX街道" oninput="handleInputChange('sendAddress'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('sendAddress')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>收件地址：</label>
                <div class="input-wrapper">
                    <input type="text" id="receiveAddress" placeholder="示例：李四 13900139000 浙江省温州市鹿城区XX街" oninput="handleInputChange('receiveAddress'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('receiveAddress')">×</button>
                </div>
            </div>

            <!-- 单号信息 -->
            <div class="input-group">
                <label>对货码：</label>
                <div class="input-wrapper">
                    <input type="text" id="checkCode" placeholder="请输入对货码" oninput="handleInputChange('checkCode'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('checkCode')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>运单号：</label>
                <div class="input-wrapper">
                    <input type="text" id="waybillNo" placeholder="请输入运单号" oninput="handleInputChange('waybillNo'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('waybillNo')">×</button>
                </div>
            </div>

            <!-- 其他信息 -->
            <div class="input-group">
                <label>备注信息：</label>
                <div class="input-wrapper">
                    <input type="text" id="remark" placeholder="请输入备注信息" oninput="handleInputChange('remark'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('remark')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>寄件时间：</label>
                <div class="input-wrapper">
                    <input type="text" id="sendTime" placeholder="请输入寄件时间（YYYY-MM-DD）" oninput="handleTimeInput(this); handleInputChange('sendTime'); renderBill()" onkeydown="handleTimeKeyDown(event)">
                    <button class="delete-btn" onclick="clearInput('sendTime')">×</button>
                </div>
            </div>
            <div class="input-group">
                <label>小件员：</label>
                <div class="input-wrapper">
                    <input type="text" id="courier" placeholder="请输入小件员姓名" oninput="handleInputChange('courier'); renderBill()">
                    <button class="delete-btn" onclick="clearInput('courier')">×</button>
                </div>
            </div>
        </div>

        <!-- 右侧：账单详情展示区 -->
        <div class="result-section" id="resultSection">
            <div class="bill-header">
                <div class="bill-title">费用合计</div>
                <div class="total-amount" id="displayTotal">¥ 0.00</div>
            </div>

            <div class="divider"></div>

            <div class="fee-detail">
                <div class="fee-row">
                    <span>总重量</span>
                    <span id="displayWeight">-</span>
                </div>
                <div class="fee-row">
                    <span>基础运费</span>
                    <span id="displayBaseFee">-</span>
                </div>
                <div class="fee-row">
                    <span>保价费</span>
                    <span id="displayInsureFee">-</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="city-flow">
                <div class="city-item">
                    <div class="city-name" id="displaySendCity">南宁市</div>
                    <div class="city-user" id="displaySendUser">KDX | ZHX</div>
                </div>
                <div class="arrow"></div>
                <div class="city-item">
                    <div class="city-name" id="displayReceiveCity">温州市</div>
                    <div class="city-user" id="displayReceiveUser">章</div>
                </div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">对货码</span>
                    <span class="info-value check-code" id="displayCheckCode">2066</span>
                </div>
                <div class="info-row">
                    <span class="info-label">运单号</span>
                    <span class="info-value" id="displayWaybillNo">SF5107641364475</span>
                </div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">寄件地址</span>
                    <span class="info-value" id="displaySendAddressFull">广西壮族自治区/南宁市/青秀区 ********</span>
                </div>
                <div class="info-row">
                    <span class="info-label">收件地址</span>
                    <span class="info-value" id="displayReceiveAddressFull">章 1*******1058<br>浙江省/温州市 浙江省温州市**********</span>
                </div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">备注信息</span>
                    <span class="info-value" id="displayRemark">-</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">寄件时间</span>
                    <span class="info-value" id="displaySendTime">2026-02-08 18:36:33</span>
                </div>
                <div class="info-row">
                    <span class="info-label">小件员</span>
                    <span class="info-value" id="displayCourier">许**</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 一键清空输入框函数
        function clearInput(inputId) {
            const input = document.getElementById(inputId);
            input.value = '';
            localStorage.removeItem(`express_${inputId}`);
            
            // 如果清空的是费用相关字段，同步处理其他字段
            if (inputId === 'totalAmount') {
                document.getElementById('baseFee').value = '';
                localStorage.removeItem('express_baseFee');
                document.getElementById('insureFee').value = '';
                localStorage.removeItem('express_insureFee');
            } else if (inputId === 'baseFee') {
                document.getElementById('totalAmount').value = '';
                localStorage.removeItem('express_totalAmount');
            } else if (inputId === 'insureFee') {
                // 清空保价费时，基础运费=总价格
                const totalAmount = parseFloat(localStorage.getItem('express_totalAmount')) || 0;
                document.getElementById('baseFee').value = totalAmount.toFixed(2);
                localStorage.setItem('express_baseFee', totalAmount.toFixed(2));
            }
            
            renderBill();
        }

        // 2. 本地存储：保存输入值并实现智能同步
        function handleInputChange(inputId) {
            const input = document.getElementById(inputId);
            localStorage.setItem(`express_${inputId}`, input.value);
            
            // 智能同步逻辑
            const totalAmount = parseFloat(localStorage.getItem('express_totalAmount')) || 0;
            const baseFee = parseFloat(localStorage.getItem('express_baseFee')) || 0;
            const insureFee = parseFloat(localStorage.getItem('express_insureFee')) || 0;
            
            if (inputId === 'totalAmount') {
                // 当输入总价格时，基础运费=总价格，保价费=0
                const total = parseFloat(input.value) || 0;
                document.getElementById('baseFee').value = total.toFixed(2);
                localStorage.setItem('express_baseFee', total.toFixed(2));
                document.getElementById('insureFee').value = '0.00';
                localStorage.setItem('express_insureFee', '0.00');
            } else if (inputId === 'insureFee') {
                // 当输入保价费时，基础运费=总价格-保价费（保持总价格不变）
                const insure = parseFloat(input.value) || 0;
                const base = totalAmount - insure;
                if (base >= 0) {
                    document.getElementById('baseFee').value = base.toFixed(2);
                    localStorage.setItem('express_baseFee', base.toFixed(2));
                } else {
                    document.getElementById('baseFee').value = '0.00';
                    localStorage.setItem('express_baseFee', '0.00');
                    document.getElementById('insureFee').value = totalAmount.toFixed(2);
                    localStorage.setItem('express_insureFee', totalAmount.toFixed(2));
                }
            } else if (inputId === 'baseFee') {
                // 当输入基础运费时，总价格=基础运费+保价费
                const base = parseFloat(input.value) || 0;
                const total = base + insureFee;
                document.getElementById('totalAmount').value = total.toFixed(2);
                localStorage.setItem('express_totalAmount', total.toFixed(2));
            }
        }

        // 3. 寄件时间智能补"-"函数（支持删除杠自动跳过）
        function handleTimeInput(input) {
            let value = input.value.replace(/[^\d-]/g, '');
            value = value.replace(/(-)+/g, '-');
            
            if (value.length === 4 && !value.includes('-')) {
                value += '-';
            } else if (value.length === 7 && value.charAt(4) === '-' && !value.includes('-', 5)) {
                value += '-';
            }
            
            if (value.length > 19) {
                value = value.substring(0, 19);
            }
            
            input.value = value;
        }

        // 处理时间输入框的删除键行为（支持跳过杠）
        function handleTimeKeyDown(event) {
            const input = event.target;
            const value = input.value;
            const selectionStart = input.selectionStart;
            
            // 只处理删除键（Backspace）
            if (event.key === 'Backspace') {
                // 如果光标在杠的位置，自动跳过杠
                if (selectionStart > 0 && value.charAt(selectionStart - 1) === '-') {
                    event.preventDefault();
                    // 删除杠和前面的数字
                    const newValue = value.substring(0, selectionStart - 1) + value.substring(selectionStart);
                    input.value = newValue;
                    input.selectionStart = input.selectionEnd = selectionStart - 1;
                    // 保存到本地存储
                    localStorage.setItem('express_sendTime', input.value);
                    renderBill();
                }
            }
        }

        // 4. 自动加单位+补两位小数函数
        function addUnit(value, type) {
            if (!value) return '-';
            const pureNum = value.replace(/[^\d.]/g, '');
            if (!pureNum) return '-';
            const fixedNum = parseFloat(pureNum).toFixed(2);
            switch(type) {
                case 'totalAmount': return `¥ ${fixedNum}`;
                case 'totalWeight': return `${fixedNum} kg`;
                case 'baseFee': return `${fixedNum} 元`;
                case 'insureFee': return `${fixedNum} 元`;
                default: return value;
            }
        }

        // 5. 精准识别城市
        function parseCityFromAddress(address) {
            if (!address) return '';
            const cleanAddr = address.replace(/[。/\\、，；：！？""''()（）【】{}]/g, '');
            const cityReg = /(省|自治区)([^市]+市)/;
            const match = cleanAddr.match(cityReg);
            if (match && match[2]) {
                return match[2].replace(/\s/g, '');
            }
            const simpleReg = /([^省自治区\s]+市)/;
            const simpleMatch = cleanAddr.match(simpleReg);
            return simpleMatch ? simpleMatch[1].replace(/\s/g, '') : '';
        }

        // 6. 修复寄件地址解析（长姓名换行问题）
        function parseSendAddressInfo(address) {
            if (!address) {
                return {
                    city: '南宁市',
                    formattedAddr: '张三 138****8000<br>广西壮族自治区/南宁市/青秀区 ********'
                };
            }
            const cleanAddr = address.replace(/[。/\\、，；：！？""''()（）【】{}]/g, '');
            const city = parseCityFromAddress(cleanAddr) || '南宁市';
            
            const nameReg = /^([^0-9\s]+)(?=\s|1[3-9]|$)/;
            const nameMatch = cleanAddr.match(nameReg);
            const name = nameMatch ? nameMatch[1].trim() : '未知';
            
            const phoneReg = /1[3-9]\d{9}/;
            const phoneMatch = cleanAddr.match(phoneReg);
            const phone = phoneMatch ? phoneMatch[0] : '';
            const maskedPhone = phone ? phone.substring(0,3) + '****' + phone.substring(7) : '无电话';
            
            let addrPart = cleanAddr.replace(nameReg, '').replace(phoneReg, '').trim();
            addrPart = addrPart.replace(/备注|说明|备注：|说明：.*/g, '').trim();
            
            let formattedAddr = `<span style="display: block;">${name} ${maskedPhone}</span>`;
            if (addrPart) {
                formattedAddr += `<span style="display: block;">${addrPart} ********</span>`;
            } else {
                formattedAddr += '<span style="display: block;">广西壮族自治区/南宁市/青秀区 ********</span>';
            }
            
            return { city, formattedAddr };
        }

        // 7. 解析收件地址（姓名取消打码）
        function parseReceiveAddressInfo(address) {
            if (!address) {
                return {
                    name: '章',
                    phone: '1*******1058',
                    city: '温州市',
                    formattedAddr: '章 139****9000<br>浙江省/温州市 浙江省温州市**********'
                };
            }
            const cleanAddr = address.replace(/[。/\\、，；：！？""''()（）【】{}]/g, '');
            
            const nameReg = /^([^0-9\s]+)(?=\s|1[3-9]|$)/;
            const nameMatch = cleanAddr.match(nameReg);
            const name = nameMatch ? nameMatch[1].trim() : '未知';
            
            const phoneReg = /1[3-9]\d{9}/;
            const phoneMatch = cleanAddr.match(phoneReg);
            const phone = phoneMatch ? phoneMatch[0] : '';
            const maskedPhone = phone ? phone.substring(0,3) + '****' + phone.substring(7) : '无电话';
            
            const city = parseCityFromAddress(cleanAddr) || '温州市';
            
            let addrPart = cleanAddr.replace(nameReg, '').replace(phoneReg, '').trim();
            addrPart = addrPart.replace(/备注|说明|备注：|说明：.*/g, '').trim();
            if (!addrPart) {
                addrPart = '浙江省/温州市 浙江省温州市**********';
            }
            
            const formattedAddr = `<span style="display: block;">${name} ${maskedPhone}</span><span style="display: block;">${addrPart}</span>`;
            
            return {
                name: name,
                phone: maskedPhone,
                city: city,
                formattedAddr: formattedAddr
            };
        }

        // 8. 核心渲染函数
        function renderBill() {
            const totalAmount = localStorage.getItem('express_totalAmount') || '';
            const totalWeight = localStorage.getItem('express_totalWeight') || '';
            const baseFee = localStorage.getItem('express_baseFee') || '';
            const insureFee = localStorage.getItem('express_insureFee') || '';
            const sendAddress = localStorage.getItem('express_sendAddress') || '';
            const receiveAddress = localStorage.getItem('express_receiveAddress') || '';
            const checkCode = localStorage.getItem('express_checkCode') || '2066';
            const waybillNo = localStorage.getItem('express_waybillNo') || 'SF5107641364475';
            const remark = localStorage.getItem('express_remark') || '-';
            const sendTime = localStorage.getItem('express_sendTime') || '2026-02-08 18:36:33';
            const courier = localStorage.getItem('express_courier') || '许**';

            const displayTotal = addUnit(totalAmount, 'totalAmount');
            const displayWeight = addUnit(totalWeight, 'totalWeight');
            const displayBaseFee = addUnit(baseFee, 'baseFee');
            const displayInsureFee = addUnit(insureFee, 'insureFee');

            const sendAddrInfo = parseSendAddressInfo(sendAddress);
            const receiveAddrInfo = parseReceiveAddressInfo(receiveAddress);

            document.getElementById('displayTotal').textContent = displayTotal;
            document.getElementById('displayWeight').textContent = displayWeight;
            document.getElementById('displayBaseFee').textContent = displayBaseFee;
            document.getElementById('displayInsureFee').textContent = displayInsureFee;
            document.getElementById('displaySendCity').textContent = sendAddrInfo.city;
            document.getElementById('displayReceiveCity').textContent = receiveAddrInfo.city;
            document.getElementById('displayReceiveUser').textContent = receiveAddrInfo.name;
            document.getElementById('displayCheckCode').textContent = checkCode;
            document.getElementById('displayWaybillNo').textContent = waybillNo;
            document.getElementById('displaySendAddressFull').innerHTML = sendAddrInfo.formattedAddr;
            document.getElementById('displayReceiveAddressFull').innerHTML = receiveAddrInfo.formattedAddr;
            document.getElementById('displayRemark').textContent = remark;
            document.getElementById('displaySendTime').textContent = sendTime;
            document.getElementById('displayCourier').textContent = courier;
        }

        // 9. 保存为图片 - 高度紧贴内容，无多余空白
        function saveAsImage() {
            const resultSection = document.getElementById('resultSection');
            const waybillNo = localStorage.getItem('express_waybillNo') || '默认运单号';
            const fileName = `快递费用${waybillNo}`;

            // 关键步骤1：获取内容实际宽高（紧贴最后一行文字，无空白）
            resultSection.style.display = 'block';
            const contentWidth = resultSection.offsetWidth;
            // 使用scrollHeight获取实际内容高度，不包含多余空白
            const contentHeight = resultSection.scrollHeight;

            // 关键步骤2：html2canvas截图，只截取实际内容区域
            html2canvas(resultSection, {
                scale: 2, // 2倍分辨率，保证图片清晰
                useCORS: true,
                logging: false,
                width: contentWidth,
                height: contentHeight,
                backgroundColor: '#ffffff', // 白色背景
                x: 0,
                y: 0
            }).then(canvas => {
                // 直接使用截图结果，不强制拉伸
                const link = document.createElement('a');
                link.download = `${fileName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                link.remove();
            }).catch(err => {
                alert('截图失败：' + err.message);
            });
        }

        // 页面加载时读取本地存储并渲染
        window.onload = function() {
            const inputIds = ['totalAmount', 'totalWeight', 'baseFee', 'insureFee', 'sendAddress', 'receiveAddress', 'checkCode', 'waybillNo', 'remark', 'sendTime', 'courier'];
            inputIds.forEach(id => {
                const savedValue = localStorage.getItem(`express_${id}`);
                if (savedValue) {
                    document.getElementById(id).value = savedValue;
                } else if (id === 'totalWeight') {
                    // 总重量默认值为1
                    document.getElementById(id).value = '1';
                    localStorage.setItem(`express_${id}`, '1');
                }
            });
            renderBill();
        };
    </script>
</body>
